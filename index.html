<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Sprint 冲刺反应测试</title>
    <!-- 引入 Tailwind CSS CDN -->
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        /* 引入 Inter 字体 */
        @import url('https://fonts.googleapis.com/css2?family=Inter:wght@400;700;900&display=swap');

        body {
            font-family: 'Inter', sans-serif;
            color: #f8fafc;
        }
        
        /* 确保测试区域占据整个视口 */
        .reaction-area {
            height: 100vh;
            width: 100vw;
            transition: background-color 0.4s ease; /* 颜色切换过渡效果 */
            cursor: pointer;
            user-select: none;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
        }

        /* 隐藏游戏容器，只显示反应区 */
        .game-container {
            display: none !important;
        }
    </style>
</head>
<body class="overflow-hidden">

    <!-- 反应测试主区域 -->
    <!-- 初始状态: bg-blue-600 (等待开始) -->
    <div id="reactionArea" class="reaction-area bg-blue-600">
        <h1 class="text-6xl md:text-8xl font-black mb-8 select-none">
            SPRINT
        </h1>
        
        <p id="instructionText" class="text-3xl font-medium mb-12 select-none">
            点击任意位置开始测试
        </p>

        <div id="resultBox" class="bg-white/10 backdrop-blur-sm p-6 rounded-xl shadow-xl border border-white/20 hidden">
            <p class="text-xl text-white">您的反应时间</p>
            <p id="reactionTimeDisplay" class="text-6xl font-extrabold text-yellow-300 mt-2">-- ms</p>
        </div>
        
    </div>

    <!-- 原始游戏容器被隐藏 -->
    <div class="game-container"></div> 

    <script>
        // Game State Constants
        const STATE_WAITING = 'waiting'; // 初始状态，点击开始 (蓝色)
        const STATE_READY = 'ready';     // 正在等待随机时间 (红色)
        const STATE_TESTING = 'testing'; // 绿色出现，计时开始

        // UI Elements
        const reactionArea = document.getElementById('reactionArea');
        const instructionText = document.getElementById('instructionText');
        const resultBox = document.getElementById('resultBox');
        const reactionTimeDisplay = document.getElementById('reactionTimeDisplay');

        // State Variables
        let currentState = STATE_WAITING;
        let timeoutId = null;
        let startTime = 0;

        // --- Helper Functions ---

        /**
         * 更新UI根据当前状态
         * @param {string} newState - 新状态
         * @param {string} colorClass - Tailwind 背景颜色类
         * @param {string} text - 提示文本
         */
        function updateUI(newState, colorClass, text) {
            currentState = newState;
            
            // 移除旧的颜色类
            reactionArea.classList.remove('bg-blue-600', 'bg-red-600', 'bg-green-600', 'bg-yellow-600');
            
            // 添加新的颜色类
            reactionArea.classList.add(colorClass);
            
            // 更新提示文本
            instructionText.textContent = text;
        }

        /**
         * 进入等待 (点击开始) 状态
         */
        function resetTest() {
            clearTimeout(timeoutId);
            resultBox.classList.add('hidden');
            
            updateUI(
                STATE_WAITING, 
                'bg-blue-600', 
                '点击任意位置开始测试'
            );
        }

        /**
         * 进入预备 (等待) 状态
         */
        function startReadyPhase() {
            updateUI(
                STATE_READY, 
                'bg-red-600', 
                '等待绿色出现，不要点击！'
            );

            // 随机延迟 1.5 到 4.5 秒
            const delay = Math.random() * 3000 + 1500;

            timeoutId = setTimeout(startTestingPhase, delay);
        }

        /**
         * 进入测试 (计时) 状态
         */
        function startTestingPhase() {
            // 记录计时开始时间
            startTime = performance.now(); 
            
            updateUI(
                STATE_TESTING, 
                'bg-green-600', 
                '冲刺！立即点击！'
            );
        }

        /**
         * 处理用户点击
         */
        function handleUserClick() {
            if (currentState === STATE_WAITING) {
                // 从等待状态进入预备状态
                startReadyPhase();
                
            } else if (currentState === STATE_READY) {
                // 提前点击，犯规！
                clearTimeout(timeoutId);
                
                updateUI(
                    STATE_WAITING, 
                    'bg-yellow-600', 
                    '太快了！您点击太早了。点击重新开始。'
                );
                
            } else if (currentState === STATE_TESTING) {
                // 成功点击，计算反应时间
                const endTime = performance.now();
                const reactionTime = Math.round(endTime - startTime);
                
                // 显示结果
                reactionTimeDisplay.textContent = `${reactionTime} ms`;
                resultBox.classList.remove('hidden');
                
                updateUI(
                    STATE_WAITING, 
                    'bg-blue-600', 
                    '点击任意位置再次测试'
                );

            }
        }
        
        // --- Initialization and Event Listeners ---

        window.onload = function() {
            resetTest();
            // 监听鼠标和触摸点击
            reactionArea.addEventListener('mousedown', handleUserClick);
            reactionArea.addEventListener('touchstart', handleUserClick, { passive: true });
        };
    </script>
</body>
</html>
